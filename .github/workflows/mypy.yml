name: Lint with MyPy

on: [push, pull_request]

jobs:
  mypy:
    timeout-minutes: 10

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mypy-requirements.txt .[all]

      - name: Run MyPy
        run: |
          mypy .
